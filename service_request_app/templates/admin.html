<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Service Requests</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            margin-bottom: 10px;
        }

        .content {
            padding: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            text-align: center;
        }

        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #666;
            font-style: italic;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            min-width: 150px;
            margin: 5px;
        }

        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            font-size: 14px;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .delete-btn:hover {
            background: #c82333;
        }

        .delete-btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Service Requests Admin Panel</h1>
            <p>View all submitted service requests</p>
        </div>

        <div class="content">
            <div id="message"></div>

            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="totalRequests">0</div>
                    <div class="stat-label">Total Requests</div>
                </div>
            </div>

            <div id="loading" class="loading">
                Loading service requests...
            </div>

            <table id="requestsTable" style="display: none;">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Mobile</th>
                        <th>Email</th>
                        <th>Service</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="requestsBody">
                </tbody>
            </table>

            <div id="noData" class="no-data" style="display: none;">
                No service requests found.
            </div>
        </div>
    </div>

    <script>
        // Function to fetch and display requests
        async function fetchRequests() {
            try {
                const response = await fetch('/requests', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });

                const data = await response.json();

                // Hide loading
                document.getElementById('loading').style.display = 'none';

                if (data.success) {
                    displayRequests(data.requests);
                    document.getElementById('totalRequests').textContent = data.total;
                } else {
                    showError(data.message || 'Failed to fetch requests');
                }
            } catch (error) {
                console.error('Error fetching requests:', error);
                document.getElementById('loading').style.display = 'none';
                showError('Failed to connect to server. Please try again.');
            }
        }

        // Function to display requests in table
        function displayRequests(requests) {
            const table = document.getElementById('requestsTable');
            const tbody = document.getElementById('requestsBody');
            const noData = document.getElementById('noData');

            if (requests.length === 0) {
                table.style.display = 'none';
                noData.style.display = 'block';
                return;
            }

            // Clear existing rows
            tbody.innerHTML = '';

            // Add rows for each request
            requests.forEach(request => {
                const row = document.createElement('tr');

                row.innerHTML = `
                    <td>${request.id}</td>
                    <td>${escapeHtml(request.name)}</td>
                    <td>${escapeHtml(request.mobile)}</td>
                    <td>${escapeHtml(request.email)}</td>
                    <td>${escapeHtml(request.service)}</td>
                    <td>${formatDate(request.date)}</td>
                    <td><button class="delete-btn" onclick="deleteRequest(${request.id})">Delete</button></td>
                `;

                tbody.appendChild(row);
            });

            table.style.display = 'table';
            noData.style.display = 'none';
        }

        // Function to show error messages
        function showError(message) {
            const messageDiv = document.getElementById('message');
            messageDiv.className = 'error';
            messageDiv.textContent = message;
            messageDiv.style.display = 'block';

            // Hide after 5 seconds
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        // Function to escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Function to format date
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString();
        }

        // Function to delete a request
        async function deleteRequest(requestId) {
            if (!confirm('Are you sure you want to delete this service request? This action cannot be undone.')) {
                return;
            }

            const deleteBtn = event.target;
            const originalText = deleteBtn.textContent;
            deleteBtn.textContent = 'Deleting...';
            deleteBtn.disabled = true;

            try {
                const response = await fetch(`/api/requests/${requestId}`, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });

                const data = await response.json();

                if (data.success) {
                    showSuccess('Request deleted successfully!');
                    // Refresh the requests list
                    fetchRequests();
                } else {
                    showError(data.message || 'Failed to delete request');
                    deleteBtn.textContent = originalText;
                    deleteBtn.disabled = false;
                }
            } catch (error) {
                console.error('Error deleting request:', error);
                showError('Failed to delete request. Please try again.');
                deleteBtn.textContent = originalText;
                deleteBtn.disabled = false;
            }
        }

        // Function to show success messages
        function showSuccess(message) {
            const messageDiv = document.getElementById('message');
            messageDiv.className = 'success';
            messageDiv.textContent = message;
            messageDiv.style.display = 'block';

            // Hide after 3 seconds
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 3000);
        }

        // Load requests when page loads
        document.addEventListener('DOMContentLoaded', function() {
            fetchRequests();
        });
    </script>
</body>
</html>
