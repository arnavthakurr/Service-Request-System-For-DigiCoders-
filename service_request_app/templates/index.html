</div>

<style>
.error-message {
    color: #dc3545;
    font-size: 0.875rem;
    margin-top: 0.25rem;
    display: none;
}

.form-group input:invalid,
.form-group select:invalid,
.form-group textarea:invalid {
    border-color: #dc3545;
}

.form-group input:valid,
.form-group select:valid,
.form-group textarea:valid {
    border-color: #28a745;
}
</style>

<script>

// Email validation
function isValidEmail(email) {
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    return emailRegex.test(email);
}

// Mobile validation
function isValidMobile(mobile) {
    const mobileRegex = /^\d{10}$/;
    return mobileRegex.test(mobile.replace(/\s+/g, ''));
}

// Form validation
function validateForm() {

    let isValid = true;

    document.querySelectorAll('.error-message').forEach(el => {
        el.style.display = 'none';
        el.textContent = '';
    });

    const name = document.getElementById('name').value.trim();
    const mobile = document.getElementById('mobile').value.trim();
    const email = document.getElementById('email').value.trim();
    const serviceType = document.getElementById('service_type').value;
    const message = document.getElementById('message_text').value.trim();

    if (!name) {
        document.getElementById('nameError').textContent = 'Full name is required';
        document.getElementById('nameError').style.display = 'block';
        isValid = false;
    }

    if (!mobile) {
        document.getElementById('mobileError').textContent = 'Mobile number is required';
        document.getElementById('mobileError').style.display = 'block';
        isValid = false;
    }
    else if (!isValidMobile(mobile)) {
        document.getElementById('mobileError').textContent = 'Mobile must be 10 digits';
        document.getElementById('mobileError').style.display = 'block';
        isValid = false;
    }

    if (!email) {
        document.getElementById('emailError').textContent = 'Email required';
        document.getElementById('emailError').style.display = 'block';
        isValid = false;
    }
    else if (!isValidEmail(email)) {
        document.getElementById('emailError').textContent = 'Invalid email';
        document.getElementById('emailError').style.display = 'block';
        isValid = false;
    }

    if (!serviceType) {
        document.getElementById('serviceError').textContent = 'Select a service';
        document.getElementById('serviceError').style.display = 'block';
        isValid = false;
    }

    if (!message) {
        document.getElementById('messageError').textContent = 'Message required';
        document.getElementById('messageError').style.display = 'block';
        isValid = false;
    }

    return isValid;
}

document.getElementById('serviceForm').addEventListener('submit', async (e) => {

    e.preventDefault();

    if (!validateForm()) return;

    const formData = {
        name: document.getElementById('name').value.trim(),
        email: document.getElementById('email').value.trim(),
        phone: document.getElementById('mobile').value.trim(),
        service_type: document.getElementById('service_type').value,
        description: document.getElementById('message_text').value.trim()
    };

    try {

        const response = await fetch('/submit-request', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(formData)
        });

        const data = await response.json();

        const messageDiv = document.getElementById('message');

        if (data.success) {
            messageDiv.textContent = "Request submitted successfully!";
            messageDiv.style.color = "green";
            document.getElementById('serviceForm').reset();
        } else {
            messageDiv.textContent = data.message;
            messageDiv.style.color = "red";
        }

    } catch (error) {

        const messageDiv = document.getElementById('message');
        messageDiv.textContent = "Server error. Try again.";
        messageDiv.style.color = "red";

    }

});

document.getElementById('mobile').addEventListener('input', function(e) {

    let value = e.target.value.replace(/\D/g, '');

    if (value.length > 10) {
        value = value.substring(0,10);
    }

    e.target.value = value;

});

</script>
